<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Color Palette</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0f14;
    font-family: 'Segoe UI', sans-serif;
    padding: 40px 32px 60px;
    color: #fff;
  }
  h1 {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,.35);
    margin-bottom: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.07);
  }
  .swatches {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
  }
  .swatch {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 8px 4px;
    cursor: pointer;
    position: relative;
    transition: filter .15s;
  }
  .swatch:hover { filter: brightness(1.1); }
  .swatch-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
  }
  .swatch-hex {
    font-size: 8px;
    letter-spacing: .5px;
    color: rgba(255,255,255,.38);
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
    margin-top: 2px;
  }
  .card-footer {
    background: #1a1c24;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .card-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,.7);
  }
  .card-base {
    margin-left: auto;
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(255,255,255,.28);
    font-family: monospace;
  }
  /* Tooltip on click */
  .copied {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,.12);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 12px;
    letter-spacing: 2px;
    color: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .copied.show { opacity: 1; }
</style>
</head>
<body>
<h1>Color Palette</h1>
<div class="grid" id="grid"></div>
<div class="copied" id="copied">COPIED</div>

<script>
const bases = [
  { hex: '#FDCBA5', name: 'Peach' },
  { hex: '#FDD069', name: 'Gold' },
  { hex: '#F88605', name: 'Orange' },
  { hex: '#FE4040', name: 'Red' },
  { hex: '#EE4B72', name: 'Rose' },
  { hex: '#EF5EB5', name: 'Pink' },
  { hex: '#9B5FE3', name: 'Violet' },
  { hex: '#7E5FFD', name: 'Purple' },
  { hex: '#07A8FA', name: 'Blue' },
  { hex: '#50C9EE', name: 'Cyan' },
  { hex: '#05F2A0', name: 'Mint' },
  { hex: '#E5E5E5', name: 'Silver' },
];

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max===min) { h=s=0; }
  else {
    const d = max-min;
    s = l>.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return [h*360, s*100, l*100];
}

function hslToHex(h, s, l) {
  s/=100; l/=100;
  const a = s*Math.min(l,1-l);
  const f = n => {
    const k=(n+h/30)%12;
    const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);
    return Math.round(255*c).toString(16).padStart(2,'0');
  };
  return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
}

function makeVariants(hex) {
  const [h, s, l] = hexToHsl(hex);
  return [
    { label: 'Light',  hex: hslToHex(h, Math.min(s*0.92, 100), Math.min(l*1.32, 88)) },
    { label: 'Normal', hex: hex.toUpperCase() },
    { label: 'Semi',   hex: hslToHex(h, Math.min(s*1.05, 100), l*0.72) },
    { label: 'Dark',   hex: hslToHex(h, Math.min(s*1.1, 100),  l*0.42) },
  ];
}

const grid = document.getElementById('grid');
const copied = document.getElementById('copied');
let copyTimer;

bases.forEach(({ hex, name }) => {
  const variants = makeVariants(hex);
  const card = document.createElement('div');
  card.className = 'card';

  const swatches = document.createElement('div');
  swatches.className = 'swatches';

  variants.forEach(v => {
    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = v.hex;
    sw.innerHTML = `<span class="swatch-label">${v.label}</span><span class="swatch-hex">${v.hex}</span>`;
    sw.addEventListener('click', () => {
      navigator.clipboard.writeText(v.hex).catch(()=>{});
      copied.textContent = `COPIED ${v.hex}`;
      copied.classList.add('show');
      clearTimeout(copyTimer);
      copyTimer = setTimeout(() => copied.classList.remove('show'), 1400);
    });
    swatches.appendChild(sw);
  });

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  footer.innerHTML = `
    <div class="card-dot" style="background:${hex}"></div>
    <div class="card-name">${name}</div>
    <div class="card-base">${hex.toUpperCase()}</div>
  `;

  card.appendChild(swatches);
  card.appendChild(footer);
  grid.appendChild(card);
});
</script>
</body>
</html>
