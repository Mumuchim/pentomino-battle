<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta id="vp" name="viewport" content="width=1920, initial-scale=1.0, minimum-scale=0.1, maximum-scale=5.0">
    <title>Vite App</title>
    <script>
      // Auto-scale: compute initial-scale so the full 1920px layout fits the
      // device screen width on load — no manual pinch-out required on mobile.
      // On desktop (screen.width >= 1920) this resolves to 1.0, no change.
      // On a 390px iPhone: 390/1920 ≈ 0.203, filling the screen perfectly.
      // The user can still pinch-zoom freely after (minimum-scale=0.1, maximum-scale=5.0).
      (function () {
        try {
          // screen.width is pre-rotation physical pixels — reliable across browsers.
          // We want landscape width, so take the larger of the two dimensions.
          var w = Math.max(window.screen.width, window.screen.height);
          var scale = Math.min(1.0, Math.max(0.1, w / 1920));
          var vp = document.getElementById('vp');
          if (vp) {
            vp.setAttribute('content',
              'width=1920' +
              ', initial-scale=' + scale.toFixed(4) +
              ', minimum-scale=0.1' +
              ', maximum-scale=5.0'
            );
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
