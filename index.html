<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/PENTObattle.png">
    <meta name="viewport" content="width=1920, initial-scale=1.0, minimum-scale=0.1, maximum-scale=5.0">
    <script>
      // Auto-scale: set initial-scale so 1920px content fits the device screen width.
      // This replaces the old "user must manually zoom out" experience.
      (function() {
        var scale = Math.min(1.0, screen.width / 1920);
        var meta = document.querySelector('meta[name=viewport]');
        if (meta) meta.setAttribute('content',
          'width=1920, initial-scale=' + scale +
          ', minimum-scale=0.1, maximum-scale=5.0'
        );
      })();
    </script>
    <title>PENTObattle</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
